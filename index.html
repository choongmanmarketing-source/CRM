<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurant CRM</title>
    <style>
      :root {
        --bg: #0b1020;
        --panel: #121a31;
        --muted: #8ea0c9;
        --text: #eef3ff;
        --brand: #6d8dff;
        --brand-2: #54d6ff;
        --ok: #21c77a;
        --warn: #f2b84b;
        --danger: #ff6b6b;
        --border: rgba(255, 255, 255, 0.12);
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Inter", "Sarabun", system-ui, -apple-system, sans-serif;
        color: var(--text);
        background: radial-gradient(1200px 800px at 20% -20%, #23315f 0%, var(--bg) 55%), var(--bg);
      }

      .container { max-width: 1100px; margin: 0 auto; padding: 24px; }

      .hero {
        display: grid;
        grid-template-columns: 1.2fr 1fr;
        gap: 16px;
        margin-bottom: 18px;
      }

      .card {
        background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,.25);
      }

      h1 { margin: 0 0 6px; font-size: 28px; }
      .subtitle { margin: 0; color: var(--muted); }
      .badge {
        display: inline-flex; align-items: center; gap: 6px;
        background: rgba(84, 214, 255, .12);
        color: #bdf2ff;
        padding: 6px 10px; border-radius: 999px; font-size: 12px; border: 1px solid rgba(84,214,255,.35);
      }

      .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
      .stat {
        background: rgba(255,255,255,.02);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
      }
      .stat .label { color: var(--muted); font-size: 12px; }
      .stat .value { font-size: 24px; font-weight: 700; margin-top: 4px; }

      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

      .section-title { margin: 0 0 10px; font-size: 18px; }
      label { display: block; margin: 10px 0 6px; color: #c6d2ef; font-size: 13px; }

      input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: rgba(9, 15, 33, .8);
        color: var(--text);
        outline: none;
      }
      input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(109,141,255,.2); }

      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

      button {
        margin-top: 12px;
        border: none;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 600;
        cursor: pointer;
        color: white;
        background: linear-gradient(90deg, var(--brand), var(--brand-2));
      }
      button.secondary { background: rgba(255,255,255,.08); border: 1px solid var(--border); }

      table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
      th, td { text-align: left; padding: 10px; border-bottom: 1px solid var(--border); }
      th { color: var(--muted); font-weight: 600; }

      .pill { padding: 3px 10px; border-radius: 999px; font-size: 12px; display: inline-block; }
      .member { background: rgba(255,255,255,.08); }
      .silver { background: rgba(185, 198, 218, .22); }
      .gold { background: rgba(242, 184, 75, .28); }
      .platinum { background: rgba(84, 214, 255, .2); }

      .toast {
        position: fixed;
        right: 16px;
        bottom: 16px;
        padding: 10px 14px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: #10192f;
        display: none;
      }
      .toast.show { display: block; }
      .toast.ok { border-color: rgba(33,199,122,.5); color: #7ef0ba; }
      .toast.error { border-color: rgba(255,107,107,.5); color: #ffb5b5; }

      @media (max-width: 900px) {
        .hero, .grid, .stats, .row { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="hero">
        <div class="card">
          <div class="badge">● CRM พร้อมใช้งาน</div>
          <h1>Restaurant Loyalty CRM</h1>
          <p class="subtitle">สะสมแต้มลูกค้า, บันทึกยอดซื้อ, และติดตามระดับสมาชิกได้ในหน้าเดียว</p>
        </div>
        <div class="card stats">
          <div class="stat"><div class="label">จำนวนลูกค้า</div><div id="stCustomers" class="value">0</div></div>
          <div class="stat"><div class="label">แต้มรวม</div><div id="stPoints" class="value">0</div></div>
          <div class="stat"><div class="label">Top Tier</div><div id="stTopTier" class="value">-</div></div>
        </div>
      </section>

      <section class="grid">
        <div class="card">
          <h2 class="section-title">เพิ่มลูกค้าใหม่</h2>
          <label>ชื่อลูกค้า</label>
          <input id="name" placeholder="เช่น คุณมินต์" />
          <label>เบอร์โทร</label>
          <input id="phone" placeholder="0812345678" />
          <button onclick="createCustomer()">เพิ่มลูกค้า</button>
        </div>

        <div class="card">
          <h2 class="section-title">บันทึกการซื้อ / ใช้แต้ม</h2>
          <label>เบอร์โทร</label>
          <input id="p_phone" placeholder="0812345678" />
          <div class="row">
            <div>
              <label>ยอดซื้อ (บาท)</label>
              <input id="amount" type="number" min="0" step="0.01" placeholder="เช่น 590" />
            </div>
            <div>
              <label>บาทต่อ 1 แต้ม</label>
              <input id="earn_rate" type="number" min="1" value="10" />
            </div>
          </div>
          <label>ใช้แต้ม</label>
          <input id="use_points" type="number" min="0" value="0" />
          <button onclick="purchase()">บันทึกธุรกรรม</button>
        </div>
      </section>

      <section class="card" style="margin-top:16px">
        <div style="display:flex; justify-content:space-between; align-items:center; gap:8px; flex-wrap:wrap;">
          <h2 class="section-title" style="margin:0">รายชื่อลูกค้า</h2>
          <button class="secondary" onclick="listCustomers()">รีเฟรชข้อมูล</button>
        </div>
        <table>
          <thead>
            <tr><th>ID</th><th>ชื่อ</th><th>เบอร์โทร</th><th>แต้ม</th><th>ระดับ</th></tr>
          </thead>
          <tbody id="customerRows">
            <tr><td colspan="5" style="color:var(--muted)">ยังไม่มีข้อมูล</td></tr>
          </tbody>
        </table>
      </section>
    </main>

    <div id="toast" class="toast"></div>

    <script>
      const rowWrap = document.getElementById('customerRows');
      const stCustomers = document.getElementById('stCustomers');
      const stPoints = document.getElementById('stPoints');
      const stTopTier = document.getElementById('stTopTier');

      const tierOrder = { Member: 1, Silver: 2, Gold: 3, Platinum: 4 };

      function tierClass(tier) {
        const t = (tier || '').toLowerCase();
        if (t === 'silver') return 'silver';
        if (t === 'gold') return 'gold';
        if (t === 'platinum') return 'platinum';
        return 'member';
      }

      function toast(msg, ok = true) {
        const el = document.getElementById('toast');
        el.className = `toast show ${ok ? 'ok' : 'error'}`;
        el.textContent = msg;
        setTimeout(() => (el.className = 'toast'), 2500);
      }

      async function apiCall(path, options = {}) {
        const bases = ['/api', ''];
        let lastErr = null;

        for (const base of bases) {
          try {
            const res = await fetch(`${base}${path}`, {
              headers: { 'Content-Type': 'application/json' },
              ...options,
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || JSON.stringify(data));
            return data;
          } catch (e) {
            lastErr = e;
          }
        }

        throw lastErr || new Error('API unavailable');
      }

      function renderCustomers(list) {
        if (!list.length) {
          rowWrap.innerHTML = '<tr><td colspan="5" style="color:var(--muted)">ยังไม่มีข้อมูล</td></tr>';
          stCustomers.textContent = '0';
          stPoints.textContent = '0';
          stTopTier.textContent = '-';
          return;
        }

        rowWrap.innerHTML = list.map(c => `
          <tr>
            <td>${c.id}</td>
            <td>${c.name}</td>
            <td>${c.phone}</td>
            <td>${c.points}</td>
            <td><span class="pill ${tierClass(c.tier)}">${c.tier}</span></td>
          </tr>
        `).join('');

        stCustomers.textContent = String(list.length);
        stPoints.textContent = String(list.reduce((s, c) => s + (c.points || 0), 0));
        const top = list.reduce((acc, c) => (tierOrder[c.tier] > tierOrder[acc] ? c.tier : acc), 'Member');
        stTopTier.textContent = top;
      }

      async function listCustomers() {
        try {
          const data = await apiCall('/customers');
          renderCustomers(data);
          toast('โหลดข้อมูลสำเร็จ');
        } catch (e) {
          toast(`โหลดข้อมูลไม่สำเร็จ: ${e.message}`, false);
        }
      }

      async function createCustomer() {
        const name = document.getElementById('name').value.trim();
        const phone = document.getElementById('phone').value.trim();
        if (!name || !phone) return toast('กรอกชื่อและเบอร์โทรให้ครบ', false);

        try {
          await apiCall('/customers', {
            method: 'POST',
            body: JSON.stringify({ name, phone }),
          });
          toast('เพิ่มลูกค้าสำเร็จ');
          document.getElementById('name').value = '';
          document.getElementById('phone').value = '';
          listCustomers();
        } catch (e) {
          toast(`เพิ่มลูกค้าไม่สำเร็จ: ${e.message}`, false);
        }
      }

      async function purchase() {
        const payload = {
          phone: document.getElementById('p_phone').value.trim(),
          amount: Number(document.getElementById('amount').value),
          earn_rate: Number(document.getElementById('earn_rate').value || 10),
          use_points: Number(document.getElementById('use_points').value || 0),
        };

        if (!payload.phone || Number.isNaN(payload.amount) || payload.amount < 0) {
          return toast('กรอกข้อมูลการซื้อให้ถูกต้อง', false);
        }

        try {
          await apiCall('/purchase', {
            method: 'POST',
            body: JSON.stringify(payload),
          });
          toast('บันทึกธุรกรรมสำเร็จ');
          document.getElementById('amount').value = '';
          document.getElementById('use_points').value = '0';
          listCustomers();
        } catch (e) {
          toast(`บันทึกไม่สำเร็จ: ${e.message}`, false);
        }
      }

      listCustomers();
    </script>
  </body>
</html>
